server.port=8080
spring.application.name=API-GATEWAY

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ===============================
# ROUTES 🔥
# ===============================
spring.cloud.gateway.routes[0].id=user-auth
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-api
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/**

spring.cloud.gateway.routes[2].id=car-service
spring.cloud.gateway.routes[2].uri=lb://CAR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/car/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**

spring.cloud.gateway.routes[4].id=rating-service
spring.cloud.gateway.routes[4].uri=lb://RATING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/review/**

spring.cloud.gateway.routes[5].id=invoice-service
spring.cloud.gateway.routes[5].uri=lb://INVOICE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/invoice/**

spring.cloud.gateway.routes[6].id=admin-service
spring.cloud.gateway.routes[6].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**

# ===============================
# JWT
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey12345

# ===============================
# FILTER
# ===============================
spring.cloud.gateway.default-filters[0]=RemoveRequestHeader=Cookie

# ===============================
# DEBUG
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
