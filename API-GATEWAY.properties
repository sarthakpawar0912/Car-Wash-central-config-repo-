server.port=8080
  spring.application.name=API-GATEWAY

  # ===============================
  # DISCOVERY
  # ===============================
  spring.cloud.gateway.discovery.locator.enabled=false
  spring.cloud.gateway.discovery.locator.lower-case-service-id=true

  # ===============================
  # EUREKA
  # ===============================
  eureka.client.service-url.defaultZone=http://localhost:8761/eureka

  eureka.instance.hostname=localhost
  eureka.instance.prefer-ip-address=false
  eureka.instance.instance-id=${spring.application.name}:${server.port}

  # ===============================
  # REDIS CONFIG
  # ===============================
  spring.data.redis.host=localhost
  spring.data.redis.port=6379

  # ===============================
  # ROUTES
  # ===============================

  # USER SERVICE (lenient - login/register)
  spring.cloud.gateway.routes[0].id=user-service
  spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
  spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/user/**,/washer/**
  spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
  spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}
  spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=5
  spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=10
  spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.requestedTokens=1

  # CAR SERVICE
  spring.cloud.gateway.routes[1].id=car-service
  spring.cloud.gateway.routes[1].uri=lb://CAR-SERVICE
  spring.cloud.gateway.routes[1].predicates[0]=Path=/car/**

  # ORDER SERVICE (stricter - prevent spam orders)
  spring.cloud.gateway.routes[2].id=order-service
  spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
  spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**
  spring.cloud.gateway.routes[2].filters[0].name=RequestRateLimiter
  spring.cloud.gateway.routes[2].filters[0].args.key-resolver=#{@userKeyResolver}
  spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.replenishRate=2
  spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.burstCapacity=3
  spring.cloud.gateway.routes[2].filters[0].args.redis-rate-limiter.requestedTokens=1

  # PAYMENT
  spring.cloud.gateway.routes[3].id=payment-service
  spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
  spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**

  # RATING
  spring.cloud.gateway.routes[4].id=rating-service
  spring.cloud.gateway.routes[4].uri=lb://RATING-SERVICE
  spring.cloud.gateway.routes[4].predicates[0]=Path=/review/**

  # INVOICE
  spring.cloud.gateway.routes[5].id=invoice-service
  spring.cloud.gateway.routes[5].uri=lb://INVOICE-SERVICE
  spring.cloud.gateway.routes[5].predicates[0]=Path=/invoice/**

  # ADMIN
  spring.cloud.gateway.routes[6].id=admin-service
  spring.cloud.gateway.routes[6].uri=lb://ADMIN-SERVICE
  spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**

   # NOTIFICATION
  spring.cloud.gateway.routes[7].id=notification-service
  spring.cloud.gateway.routes[7].uri=lb://NOTIFICATION-SERVICE
  spring.cloud.gateway.routes[7].predicates[0]=Path=/notification/**

  # ===============================
  # JWT
  # ===============================
  jwt.secret=mysupersecretkeymysupersecretkey12345

  # ===============================
  # ACTUATOR & PROMETHEUS
  # ===============================
  management.endpoints.web.exposure.include=*
  management.endpoint.health.show-details=always
  management.endpoint.prometheus.enabled=true
  management.metrics.export.prometheus.enabled=true

  # ===============================
  # DEBUG
  # ===============================
  logging.level.org.springframework.cloud.gateway=INFO
  logging.level.reactor.netty=INFO
