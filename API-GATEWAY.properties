server.port=8080
spring.application.name=API-GATEWAY

# ===============================
# DISCOVERY
# ===============================
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# ROUTES (OPTIMIZED 🔥)
# ===============================

# USER SERVICE (MERGED)
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/user/**,/washer/**

# CAR
spring.cloud.gateway.routes[1].id=car-service
spring.cloud.gateway.routes[1].uri=lb://CAR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/car/**

# ORDER
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**

# PAYMENT
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**

# RATING
spring.cloud.gateway.routes[4].id=rating-service
spring.cloud.gateway.routes[4].uri=lb://RATING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/review/**

# INVOICE
spring.cloud.gateway.routes[5].id=invoice-service
spring.cloud.gateway.routes[5].uri=lb://INVOICE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/invoice/**

# ADMIN
spring.cloud.gateway.routes[6].id=admin-service
spring.cloud.gateway.routes[6].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**

# ===============================
# JWT
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey12345

# ===============================
# CLEANUP
# ===============================
spring.cloud.gateway.default-filters[0]=RemoveRequestHeader=Cookie

# ===============================
# DEBUG
# ===============================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
