server.port=8080
spring.application.name=API-GATEWAY

# ===============================
# DISCOVERY
# ===============================
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# REDIS CONFIG
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# ROUTES
# ===============================

# USER SERVICE
spring.cloud.gateway.routes[0].id=USER-SERVICE
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/user/**,/washer/**

# 🔥 RATE LIMIT (USER)
spring.cloud.gateway.routes[0].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=5,redis-rate-limiter.burstCapacity=10,key-resolver=#{@userKeyResolver}

# CAR SERVICE
spring.cloud.gateway.routes[1].id=CAR-SERVICE
spring.cloud.gateway.routes[1].uri=lb://CAR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/car/**

# ORDER SERVICE
spring.cloud.gateway.routes[2].id=ORDER-SERVICE
spring.cloud.gateway.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/order/**

# 🔥 RATE LIMIT (ORDER)
spring.cloud.gateway.routes[2].filters[0]=RequestRateLimiter=redis-rate-limiter.replenishRate=3,redis-rate-limiter.burstCapacity=5,key-resolver=#{@userKeyResolver}

# PAYMENT
spring.cloud.gateway.routes[3].id=PAYMENT-SERVICE
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**

# RATING
spring.cloud.gateway.routes[4].id=RATING-SERVICE
spring.cloud.gateway.routes[4].uri=lb://RATING-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/review/**

# INVOICE
spring.cloud.gateway.routes[5].id=INVOICE-SERVICE
spring.cloud.gateway.routes[5].uri=lb://INVOICE-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/invoice/**

# ADMIN
spring.cloud.gateway.routes[6].id=ADMIN-SERVICE
spring.cloud.gateway.routes[6].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**

# ===============================
# JWT
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey12345

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# CLEANUP
# ===============================
spring.cloud.gateway.default-filters[0]=RemoveRequestHeader=Cookie

# ===============================
# DEBUG
# ===============================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
